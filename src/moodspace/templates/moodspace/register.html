{% extends 'moodspace/base.html' %}

{% block title %}Регистрация{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm recommendation-card">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">
                    Регистрация
                </h3>

                <form method = 'POST'>
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="text-center mt-4">
                        <button type = 'submit' class="btn btn-viol">Зарегистрироваться</button>
                    </div>
                    
                </form>

                <hr>

                <p class="text-center mb-0">
                    Уже есть аккаунт?
                    <a href="{url 'login' %}">
                        Войти

                </p>
            </div>

        </div>

    </div>

</div>

    
{% endblock %}
