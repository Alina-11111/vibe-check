{% extends 'moodspace/base.html' %}

{% block title %}Вход{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm recommendation-card">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">
                    Войти
                </h3>
                
                <form method = 'POST'>
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="text-center mt-4">
                        <button type = 'submit' class="btn btn-viol">Войти</button>
                    </div>
                    
                </form>

                <hr>
                

                <p class="text-center mb-0">
                    Нет аккаунта?
                    <a href="{% url 'register' %}"> Зерегистрируйтесь
                    </a>    
                </p>
    
                     
            </div>

        </div>

    </div>

</div>
    {% endblock %}
