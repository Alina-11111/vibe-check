{% extends 'moodspace/base.html' %}

{% load  static %}
{% block title %}Рекомендации{% endblock %}
{% block content %}

<div class="d-flex flex-column justify-content-center align-items-center"
    style="min-height: 80vh;"> 
    <h3 class="text-center mb-4">Какое у тебя настроение?</h3>

    <div class="row">
    {% for i in vibes %}
        <div class="col-md-3 col-lg-2 mb-4">
            <a href="{% url 'vibe_rec' i.id%}" class="text-decoration-none text-dark">
                <div class="card shadow-sm h-100 text-center p-4 mood-card">
                     <img src="{% static i.image_vibe %}"
                        class="mx-auto mood-image"
                        alt="{{ i.vibe_name }}">

                        <h6 class="mt-3">{{ i.vibe_name }}</h6>
                </div>
            
            </a>
        </div>
        
        {% empty %}
        <div class="alert alert-info">
            <p>Пока ничего нет</p>
        </div>

    {% endfor %}
    </div>
</div>
{% endblock %}
